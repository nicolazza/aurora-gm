    <script>
        // Simple TOTP implementation (RFC 6238)
        window.TOTP = {
            // Generate random secret (base32)
            generateSecret: function() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
                let secret = '';
                for (let i = 0; i < 32; i++) {
                    secret += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return secret;
            },
            
            // Base32 decode
            base32Decode: function(str) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
                let bits = 0;
                let value = 0;
                let index = 0;
                const output = new Uint8Array(((str.length * 5) / 8) | 0);
                
                for (let i = 0; i < str.length; i++) {
                    value = (value << 5) | chars.indexOf(str[i].toUpperCase());
                    bits += 5;
                    if (bits >= 8) {
                        output[index++] = (value >>> (bits - 8)) & 255;
                        bits -= 8;
                    }
                }
                return output;
            },
            
            // Generate TOTP code
            generate: function(secret, timeStep = 30) {
                const key = this.base32Decode(secret);
                const time = Math.floor(Date.now() / 1000 / timeStep);
                
                // Convert time to 8-byte buffer (big-endian)
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setUint32(4, time, false); // Big-endian
                
                // HMAC-SHA1
                const crypto = window.crypto || window.msCrypto;
                if (!crypto || !crypto.subtle) {
                    // Fallback: use simple implementation
                    return this.generateFallback(key, time);
                }
                
                return crypto.subtle.importKey(
                    'raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
                ).then(key => {
                    return crypto.subtle.sign('HMAC', key, timeBuffer);
                }).then(signature => {
                    const bytes = new Uint8Array(signature);
                    const offset = bytes[19] & 0x0f;
                    const code = ((bytes[offset] & 0x7f) << 24 |
                                  (bytes[offset + 1] & 0xff) << 16 |
                                  (bytes[offset + 2] & 0xff) << 8 |
                                  (bytes[offset + 3] & 0xff)) % 1000000;
                    return code.toString().padStart(6, '0');
                });
            },
            
            // Fallback implementation (simpler, less secure)
            generateFallback: function(key, time) {
                // Simple hash-based approach
                let hash = 0;
                const timeStr = time.toString();
                for (let i = 0; i < key.length; i++) {
                    hash = ((hash << 5) - hash) + key[i] + timeStr.charCodeAt(i % timeStr.length);
                    hash = hash & hash;
                }
                const code = Math.abs(hash) % 1000000;
                return code.toString().padStart(6, '0');
            },
            
            // Verify TOTP code
            verify: async function(token, secret, window = 1) {
                const timeStep = 30;
                const currentTime = Math.floor(Date.now() / 1000 / timeStep);
                
                for (let i = -window; i <= window; i++) {
                    const time = currentTime + i;
                    const expected = await this.generateForTime(secret, time);
                    if (expected === token) {
                        return true;
                    }
                }
                return false;
            },
            
            generateForTime: async function(secret, timeCounter) {
                const key = this.base32Decode(secret);
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setUint32(4, timeCounter, false);
                
                const crypto = window.crypto || window.msCrypto;
                if (!crypto || !crypto.subtle) {
                    return this.generateFallback(key, timeCounter);
                }
                
                const importedKey = await crypto.subtle.importKey(
                    'raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
                );
                const signature = await crypto.subtle.sign('HMAC', importedKey, timeBuffer);
                const bytes = new Uint8Array(signature);
                const offset = bytes[19] & 0x0f;
                const code = ((bytes[offset] & 0x7f) << 24 |
                              (bytes[offset + 1] & 0xff) << 16 |
                              (bytes[offset + 2] & 0xff) << 8 |
                              (bytes[offset + 3] & 0xff)) % 1000000;
                return code.toString().padStart(6, '0');
            },
            
            // Generate otpauth URL
            keyuri: function(accountName, serviceName, secret) {
                return `otpauth://totp/${encodeURIComponent(serviceName)}:${encodeURIComponent(accountName)}?secret=${secret}&issuer=${encodeURIComponent(serviceName)}`;
            }
        };
    </script>

    <!-- Login Page (not authenticated and no guest access) -->

            </div>
            <h1 class="text-2xl font-bold text-slate-800">{{ $t('login.app_title') }}</h1>
            <p class="text-sm text-slate-500 mt-1">{{ $t('login.app_subtitle') }}</p>
          </div>

          <!-- Login Form (username / password) -->
          <form v-if="!requires2FA" @submit.prevent="handleLogin" class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{{ $t('login.username') }}</label>
              <input v-model="loginUsername" type="text" required autocomplete="username"
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-purple-400 focus:ring-2 focus:ring-purple-100 outline-none transition text-sm"
                     :placeholder="$t('login.username_placeholder')">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{{ $t('login.password') }}</label>
              <input v-model="loginPassword" type="password" required autocomplete="current-password"
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-purple-400 focus:ring-2 focus:ring-purple-100 outline-none transition text-sm"
                     :placeholder="$t('login.password_placeholder')">
            </div>
            <p v-if="loginError" class="text-red-600 text-sm font-medium"><i class="fas fa-exclamation-circle mr-1"></i>{{ loginError }}</p>
            <button type="submit" :disabled="isLoading"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 disabled:opacity-60 disabled:cursor-wait text-white rounded-xl font-bold text-sm shadow-lg shadow-purple-200 transition active:scale-[0.98]">
              <i v-if="isLoading" class="fas fa-spinner fa-spin mr-2"></i>{{ $t('login.login_button') }}
            </button>
          </form>

          <!-- 2FA Code Entry (shown after username/password succeeds) -->
          <form v-else @submit.prevent="handle2FALogin" class="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 space-y-4">
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
              <p class="text-sm text-blue-800">
                <i class="fas fa-shield-halved mr-2"></i>{{ $t('login.enter_2fa_code') }}
              </p>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">{{ $t('login.code_label') }}</label>
              <input v-model="twoFactorCode" type="text" required
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-purple-400 focus:ring-2 focus:ring-purple-100 outline-none transition text-center text-2xl tracking-widest"
                     :placeholder="$t('login.code_placeholder')" maxlength="6" pattern="[0-9]{6}"
                     @input="twoFactorCode = twoFactorCode.replace(/[^0-9]/g, '')">
              <p class="text-xs text-slate-400 mt-1.5">{{ $t('login.or_backup_code') }}</p>
            </div>
            <p v-if="loginError" class="text-red-600 text-sm font-medium"><i class="fas fa-exclamation-circle mr-1"></i>{{ loginError }}</p>
            <button type="submit"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-purple-200 transition active:scale-[0.98]">
              {{ $t('login.verify_button') }}
            </button>
            <button type="button" @click="cancelLogin"
                    class="w-full py-2.5 text-slate-500 hover:text-slate-700 text-sm font-medium transition">
              <i class="fas fa-arrow-left mr-1"></i>{{ $t('login.back') }}
            </button>
          </form>

          <!-- Language switcher (accessible from login page) -->
          <div class="flex justify-center mt-6">
            <button type="button" @click="switchLocale"
                    class="text-xs text-slate-400 hover:text-purple-600 transition font-medium">
              {{ $i18n.locale === 'en' ? 'Cambiar a Español' : 'Switch to English' }}
            </button>
