    <div v-if="isLoading" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-8 flex flex-col items-center gap-4 min-w-[300px]">
            <div v-if="uploadProgress > 0" class="w-full">
                <!-- Progress Bar -->
                <div class="w-full bg-gray-200 rounded-full h-3 mb-3">
                    <div class="bg-blue-600 h-3 rounded-full transition-all duration-300" :style="{ width: uploadProgress + '%' }"></div>
                </div>
                <p class="text-center text-sm text-gray-600">{{ uploadProgress }}%</p>
            </div>
            <div v-else class="relative w-16 h-16">
                <div class="absolute inset-0 border-4 border-gray-200 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <p class="text-gray-700 font-bold text-lg">{{ loadingMessage }}</p>
        </div>
    </div>

    <!-- Notification Toast -->
    <transition name="fade">
        <div v-if="notification.show" 
             class="fixed top-4 right-4 z-[9998] max-w-md animate-fade-in-up"
             :class="{
                 'bg-green-500': notification.type === 'success',
                 'bg-red-500': notification.type === 'error',
                 'bg-blue-500': notification.type === 'info'
             }"
             style="animation: fadeInUp 0.3s ease-out;">
            <div class="bg-white rounded-lg shadow-2xl p-4 flex items-center gap-3 border-l-4"
                 :class="{
                     'border-green-500': notification.type === 'success',
                     'border-red-500': notification.type === 'error',
                     'border-blue-500': notification.type === 'info'
                 }">
                <i class="fas text-2xl"
                   :class="{
                       'fa-check-circle text-green-500': notification.type === 'success',
                       'fa-exclamation-circle text-red-500': notification.type === 'error',
                       'fa-info-circle text-blue-500': notification.type === 'info'
                   }"></i>
                <p class="text-gray-800 font-bold flex-1">{{ notification.message }}</p>
                <button @click="notification.show = false" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </transition>

    <!-- Confirm Dialog -->
    <div v-if="confirmDialog && confirmDialog.show && confirmDialog.message && confirmDialog.message.trim() !== ''" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full mx-4 animate-fade-in-up">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-yellow-600 text-xl"></i>
                </div>
                <h3 class="font-bold text-lg text-gray-800">{{ $t('confirm_dialog.title') }}</h3>
            </div>
            <p class="text-gray-700 mb-6">{{ confirmDialog.message }}</p>
            <div class="flex gap-3 justify-end">
                <button @click="handleCancel()" 
                        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-bold transition">
                    {{ $t('confirm_dialog.cancel') }}
                </button>
                <button @click="handleConfirm()" 
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition">
                    {{ $t('confirm_dialog.confirm') }}
                </button>
            </div>
        </div>
    </div>
